name: Fleet Cycle

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run fleet cycle
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          AIRTABLE_PAT: ${{ secrets.AIRTABLE_PAT }}
          AIRTABLE_BASE: ${{ secrets.AIRTABLE_BASE }}
          GITHUB_TOKEN: ${{ secrets.FLEET_GITHUB_TOKEN }}
          FLEET_MODEL: ${{ vars.FLEET_MODEL || 'google/gemini-2.5-flash' }}
          FLEET_REASONING_MODEL: ${{ vars.FLEET_REASONING_MODEL || 'anthropic/claude-sonnet-4-6' }}
          MAX_COST_PER_RUN: '0.25'
        run: python cloud-fleet/orchestrator.py cycle
